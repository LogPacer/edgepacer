name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Normalize Linux Rust paths
        run: |
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export PATH="${CARGO_HOME}/bin:${PATH}"
          echo "CARGO_HOME=${CARGO_HOME}" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=${RUSTUP_HOME}" >> "$GITHUB_ENV"
          echo "${CARGO_HOME}/bin" >> "$GITHUB_PATH"
          if [ ! -x "${CARGO_HOME}/bin/cargo" ] || [ ! -x "${CARGO_HOME}/bin/rustup" ]; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs |
              sh -s -- --default-toolchain none -y
          fi

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake perl protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  ebpf:
    name: Rust eBPF Feature
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Normalize Linux Rust paths
        run: |
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export PATH="${CARGO_HOME}/bin:${PATH}"
          echo "CARGO_HOME=${CARGO_HOME}" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=${RUSTUP_HOME}" >> "$GITHUB_ENV"
          echo "${CARGO_HOME}/bin" >> "$GITHUB_PATH"
          if [ ! -x "${CARGO_HOME}/bin/cargo" ] || [ ! -x "${CARGO_HOME}/bin/rustup" ]; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs |
              sh -s -- --default-toolchain none -y
          fi

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake perl protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Clippy eBPF feature
        run: cargo clippy --features ebpf --all-targets -- -D warnings

      - name: Test eBPF feature
        run: cargo test --features ebpf

  bpf-object:
    name: BPF Object
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Normalize Linux Rust paths
        run: |
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export PATH="${CARGO_HOME}/bin:${PATH}"
          echo "CARGO_HOME=${CARGO_HOME}" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=${RUSTUP_HOME}" >> "$GITHUB_ENV"
          echo "${CARGO_HOME}/bin" >> "$GITHUB_PATH"
          if [ ! -x "${CARGO_HOME}/bin/cargo" ] || [ ! -x "${CARGO_HOME}/bin/rustup" ]; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs |
              sh -s -- --default-toolchain none -y
          fi

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-27
          components: rust-src, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bpf -> target
          cache-on-failure: true

      - name: Install bpf-linker
        uses: taiki-e/install-action@v2
        with:
          tool: bpf-linker@0.10.3

      - name: Verify committed BPF object
        run: scripts/regen-bpf-object.sh --check

  helm:
    name: Helm
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/edgepacer

      - name: Render chart
        run: scripts/kubernetes/validate-kind.sh --render-only

      - name: Test eBPF chart profile
        run: scripts/kubernetes/test-ebpf-chart.sh

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Normalize Linux Rust paths
        run: |
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export PATH="${CARGO_HOME}/bin:${PATH}"
          echo "CARGO_HOME=${CARGO_HOME}" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=${RUSTUP_HOME}" >> "$GITHUB_ENV"
          echo "${CARGO_HOME}/bin" >> "$GITHUB_PATH"
          if [ ! -x "${CARGO_HOME}/bin/cargo" ] || [ ! -x "${CARGO_HOME}/bin/rustup" ]; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs |
              sh -s -- --default-toolchain none -y
          fi

      - uses: taiki-e/install-action@v2
        with:
          # Pinned: newer cargo-deny moved `-c`/`check`-level flags and breaks
          # the invocations below when installed unpinned.
          tool: cargo-deny@0.19.9

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Install third-party license tool
        run: |
          if ! command -v dd-rust-license-tool >/dev/null 2>&1 || ! cargo install --list | grep -q '^dd-rust-license-tool v1\.0\.4:'; then
            cargo install dd-rust-license-tool --version 1.0.4 --locked --force
          fi
          command -v dd-rust-license-tool

      - name: Check root dependency policy
        run: cargo deny --locked check --hide-inclusion-graph -c deny.toml advisories bans licenses sources

      - name: Check BPF dependency policy
        run: cargo deny --manifest-path bpf/Cargo.toml --locked check --hide-inclusion-graph -c bpf/deny.toml advisories bans licenses sources

      - name: Check third-party license inventory
        run: scripts/third-party-licenses.sh check

      - name: Audit root lockfile
        run: cargo audit

      - name: Audit BPF lockfile
        run: cargo audit --file bpf/Cargo.lock
