name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake perl protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Format
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  ebpf:
    name: Rust eBPF Feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake perl protobuf-compiler

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Clippy eBPF feature
        run: cargo clippy --features ebpf --all-targets -- -D warnings

  bpf-object:
    name: BPF Object
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-27
          components: rust-src, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bpf -> target
          cache-on-failure: true

      - name: Install bpf-linker
        uses: taiki-e/install-action@v2
        with:
          tool: bpf-linker@0.10.3

      - name: Verify committed BPF object
        run: scripts/regen-bpf-object.sh --check

  helm:
    name: Helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/edgepacer

      - name: Render chart
        run: scripts/kubernetes/validate-kind.sh --render-only

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Check root dependency policy
        run: cargo deny --locked check --hide-inclusion-graph -c deny.toml advisories bans licenses sources

      - name: Check BPF dependency policy
        run: cargo deny --manifest-path bpf/Cargo.toml --locked check --hide-inclusion-graph -c bpf/deny.toml advisories bans licenses sources

      - name: Audit root lockfile
        run: cargo audit

      - name: Audit BPF lockfile
        run: cargo audit --file bpf/Cargo.lock
