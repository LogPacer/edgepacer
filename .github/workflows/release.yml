name: Release

on:
  push:
    tags:
      - "v*"
      - "manager-v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
      component:
        description: Release stream (agent or manager)
        type: choice
        options:
          - agent
          - manager
        default: agent

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/logpacer/edgepacer
  CHART_REPOSITORY: oci://ghcr.io/logpacer/charts

jobs:
  resolve:
    name: Resolve Version
    runs-on: ubuntu-24.04
    permissions: {}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      component: ${{ steps.version.outputs.component }}
    steps:
      - name: Resolve version + stream
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_COMPONENT: ${{ inputs.component }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION}"
            component="${INPUT_COMPONENT:-agent}"
          else
            case "${REF_NAME}" in
              manager-v*)
                component="manager"
                version="${REF_NAME#manager-v}"
                ;;
              v*)
                component="agent"
                version="${REF_NAME#v}"
                ;;
              *)
                echo "unrecognized release ref: ${REF_NAME}" >&2
                exit 1
                ;;
            esac
          fi
          case "${version}" in
            *-dev*)
              echo "refusing to publish a dev-marked version: ${version}" >&2
              exit 1
              ;;
          esac
          if [ "${component}" = "manager" ]; then
            tag="manager-v${version}"
          else
            tag="v${version}"
          fi
          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "component=${component}"
          } >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build ${{ matrix.name }} Binary
    needs: resolve
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    env:
      AUDITABLE_RELEASE_BUILDS: "1"
      # Clean, resolved version for release builds so build.rs stamps e.g. 1.4.3
      # instead of a -dev marker. Local/untagged builds (without this env) get -dev.
      EDGEPACER_RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            target: linux-amd64
            runs-on: ubuntu-24.04
          - name: Linux arm64
            target: linux-arm64
            runs-on: ubuntu-24.04
          - name: Windows amd64
            target: windows-amd64
            runs-on: ubuntu-24.04
          - name: macOS amd64
            target: darwin-amd64
            runs-on: macos-14
          - name: macOS arm64
            target: darwin-arm64
            runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-auditable@0.7.4

      - name: Install cross
        if: runner.os == 'Linux'
        run: |
          docker version
          if ! cargo install --list | grep -q '^cross v0\.2\.5:'; then
            cargo install cross --version 0.2.5 --locked --force
          fi

      - name: Build release binaries
        run: scripts/release-package.sh --version "${{ needs.resolve.outputs.version }}" --skip-manifest ${{ matrix.target }}

      - name: Verify auditable release binaries
        run: |
          release_binaries=()
          while IFS= read -r -d '' release_binary; do
            release_binaries+=("${release_binary}")
          done < <(
            find dist -maxdepth 1 -type f \
              \( -name 'edgepacer-${{ matrix.target }}*' -o -name 'edgepacer-manager-${{ matrix.target }}*' \) \
              ! -name '*.sha256' \
              -print0
          )
          if [ "${#release_binaries[@]}" -eq 0 ]; then
            echo "no release binaries found for ${{ matrix.target }}" >&2
            exit 1
          fi
          cargo audit bin "${release_binaries[@]}"

      - name: Build release manifest tool
        if: matrix.target == 'linux-amd64'
        run: |
          cross build --locked --release --target x86_64-unknown-linux-musl --bin edgepacer-release-manifest
          mkdir -p tools
          install -m 0555 target/x86_64-unknown-linux-musl/release/edgepacer-release-manifest tools/release-manifest

      - name: Upload release binaries
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/edgepacer-*
            dist/edgepacer-manager-*
          if-no-files-found: error

      - name: Upload release manifest tool
        if: matrix.target == 'linux-amd64'
        uses: actions/upload-artifact@v7
        with:
          name: manifest-tool
          path: tools/release-manifest
          if-no-files-found: error

  publish:
    name: Publish Agent Release
    needs:
      - resolve
      - build-binaries
    if: ${{ needs.resolve.outputs.component == 'agent' }}
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
      packages: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.5.3"

      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download release manifest tool
        uses: actions/download-artifact@v8
        with:
          name: manifest-tool
          path: dist/tools

      - name: Resolve release manifest tool
        id: manifest_tool
        run: |
          manifest_tool="$(find dist/tools -type f -name release-manifest -print -quit)"
          if [ -z "${manifest_tool}" ]; then
            echo "failed to find downloaded release-manifest tool" >&2
            find dist/tools -maxdepth 3 -type f -print >&2
            exit 1
          fi
          chmod 0555 "${manifest_tool}"
          echo "path=${manifest_tool}" >> "$GITHUB_OUTPUT"

      - name: Stage image binaries
        run: |
          mkdir -p .docker-stage/amd64 .docker-stage/arm64
          install -m 0555 dist/edgepacer-linux-amd64 .docker-stage/amd64/edgepacer
          install -m 0555 dist/edgepacer-manager-linux-amd64 .docker-stage/amd64/edgepacer-manager
          install -m 0555 dist/edgepacer-linux-arm64 .docker-stage/arm64/edgepacer
          install -m 0555 dist/edgepacer-manager-linux-arm64 .docker-stage/arm64/edgepacer-manager

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          scripts/container-image.sh \
            --push \
            --image "${IMAGE}" \
            --tag "${{ needs.resolve.outputs.version }}" \
            --version "${{ needs.resolve.outputs.version }}" \
            --latest

      - name: Resolve image digest
        id: image
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE}:${{ needs.resolve.outputs.version }}" | awk '/Digest:/ { print $2; exit }')"
          if [ -z "${digest}" ]; then
            echo "failed to resolve image digest" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign image
        run: cosign sign --yes "${{ steps.image.outputs.ref }}"

      - name: Attest image provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Login Helm to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        id: chart
        run: |
          mkdir -p dist/charts
          helm package charts/edgepacer \
            --version "${{ needs.resolve.outputs.version }}" \
            --app-version "${{ needs.resolve.outputs.version }}" \
            --destination dist/charts
          push_output="$(helm push "dist/charts/edgepacer-${{ needs.resolve.outputs.version }}.tgz" "${CHART_REPOSITORY}" 2>&1)"
          printf '%s\n' "${push_output}"
          digest="$(printf '%s\n' "${push_output}" | awk '/Digest:/ { print $2; exit }')"
          if [ -z "${digest}" ]; then
            echo "failed to resolve chart digest" >&2
            exit 1
          fi
          chart_ref="ghcr.io/logpacer/charts/edgepacer@${digest}"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "ref=${chart_ref}" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/logpacer/charts/edgepacer" >> "$GITHUB_OUTPUT"

      - name: Sign chart
        run: cosign sign --yes "${{ steps.chart.outputs.ref }}"

      - name: Attest chart provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.chart.outputs.name }}
          subject-digest: ${{ steps.chart.outputs.digest }}
          push-to-registry: true

      - name: Generate signed update manifest
        env:
          EDGEPACER_UPDATE_SIGNING_KEY: ${{ secrets.EDGEPACER_UPDATE_SIGNING_KEY }}
        run: |
          scripts/release-package.sh \
            --skip-build \
            --version "${{ needs.resolve.outputs.version }}" \
            --tag "${{ needs.resolve.outputs.tag }}" \
            --repository "${{ github.repository }}" \
            --dist-dir dist \
            --manifest-tool "${{ steps.manifest_tool.outputs.path }}" \
            --sign-blobs

      - name: Attest release artifact provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/edgepacer-*
            dist/edgepacer-manager-*
            dist/checksums.txt
            dist/LICENSE-3rdparty.csv
            dist/update-manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.resolve.outputs.tag }}"
          notes_file="$(mktemp)"
          printf 'EdgePacer %s\n\nRelease binaries are signed with Sigstore bundles and listed in update-manifest.json. Third-party dependency attribution is included in LICENSE-3rdparty.csv.\n' "${tag}" > "${notes_file}"
          mapfile -d '' release_assets < <(find dist -maxdepth 1 -type f -print0)

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${release_assets[@]}" --clobber
          else
            gh release create "${tag}" "${release_assets[@]}" \
              --target "${GITHUB_SHA}" \
              --title "EdgePacer ${tag}" \
              --notes-file "${notes_file}"
          fi

  publish-manager:
    name: Publish Manager Release
    needs:
      - resolve
      - build-binaries
    if: ${{ needs.resolve.outputs.component == 'manager' }}
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.5.3"

      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download release manifest tool
        uses: actions/download-artifact@v8
        with:
          name: manifest-tool
          path: dist/tools

      - name: Resolve release manifest tool
        id: manifest_tool
        run: |
          manifest_tool="$(find dist/tools -type f -name release-manifest -print -quit)"
          if [ -z "${manifest_tool}" ]; then
            echo "failed to find downloaded release-manifest tool" >&2
            find dist/tools -maxdepth 3 -type f -print >&2
            exit 1
          fi
          chmod 0555 "${manifest_tool}"
          echo "path=${manifest_tool}" >> "$GITHUB_OUTPUT"

      - name: Scope dist to the manager binaries
        run: |
          # The build job produces both agent + manager binaries; the manager
          # release ships only the edgepacer-manager-* binaries, so drop the agent
          # ones before the manifest + release steps glob dist.
          find dist -maxdepth 1 -name 'edgepacer-*' ! -name 'edgepacer-manager-*' -delete

      - name: Generate signed update manifest
        env:
          EDGEPACER_UPDATE_SIGNING_KEY: ${{ secrets.EDGEPACER_UPDATE_SIGNING_KEY }}
        run: |
          scripts/release-package.sh \
            --skip-build \
            --version "${{ needs.resolve.outputs.version }}" \
            --tag "${{ needs.resolve.outputs.tag }}" \
            --repository "${{ github.repository }}" \
            --dist-dir dist \
            --manifest-tool "${{ steps.manifest_tool.outputs.path }}" \
            --sign-blobs

      - name: Attest release artifact provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/edgepacer-manager-*
            dist/checksums.txt
            dist/LICENSE-3rdparty.csv
            dist/update-manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.resolve.outputs.tag }}"
          notes_file="$(mktemp)"
          printf 'EdgePacer Manager %s\n\nManager binaries are signed with Sigstore bundles and listed in update-manifest.json. Third-party dependency attribution is included in LICENSE-3rdparty.csv.\n' "${tag}" > "${notes_file}"
          mapfile -d '' release_assets < <(find dist -maxdepth 1 -type f -print0)

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${release_assets[@]}" --clobber
          else
            gh release create "${tag}" "${release_assets[@]}" \
              --target "${GITHUB_SHA}" \
              --title "EdgePacer Manager ${tag}" \
              --notes-file "${notes_file}"
          fi
