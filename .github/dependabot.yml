version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    groups:
      rust-patch:
        patterns:
          - "*"
        update-types:
          - patch
      rust-minor:
        patterns:
          - "*"
        update-types:
          - minor
      rust-major:
        patterns:
          - "*"
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
